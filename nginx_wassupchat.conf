server {
    listen 80;
    server_name _; # Replace with your VM's public IP or Domain

    location / {
        include proxy_params;
        proxy_pass http://127.0.0.1:5000;
        
        # Necessary for WebSockets (Socket.IO)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_redirect off;
    }

    # Optional: Serve static files directly via Nginx for better performance
    location /static/ {
        alias /home/azureuser/Eco10_project/static/; # Update path to your local project directory
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
