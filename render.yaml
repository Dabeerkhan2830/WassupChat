services:
  - type: web
    name: wassupchat
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn --config gunicorn.conf.py app:app"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wassupchat-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.8

databases:
  - name: wassupchat-db
    databaseName: wassupchat
    user: wassupchat_user
